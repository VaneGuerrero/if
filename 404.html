<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ImaginaITS Clone</title>
  <style>
    body{font-family:Arial,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#f8fafc;color:#0f172a}
    .box{max-width:760px;padding:24px;border:1px solid #e2e8f0;border-radius:12px;background:#fff}
    a{color:#0369a1}
    code{background:#e2e8f0;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <main class="box">
    <h1>Cargando ImaginaITS Clone…</h1>
    <p id="msg">Redirigiendo al sitio estático.</p>
    <p>Si no redirige automáticamente, abre: <a id="manual" href="project/pages/index.html">project/pages/index.html</a></p>
  </main>
  <script>
    (function () {
      const p = window.location.pathname;
      const repoBase = p.startsWith('/if') ? '/if' : '';
      const target = repoBase + '/project/pages/index.html';
      document.getElementById('manual').setAttribute('href', target);
      document.getElementById('msg').innerHTML = 'Destino detectado: <code>' + target + '</code>';
      window.location.replace(target);
    })();
  </script>
</body>
</html>
